<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<meta name="theme-color" content="#7ECFC0">
<title>MIB — Saúde Mental</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Roboto:wght@400;500;600;700;900&display=swap" rel="stylesheet">
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:opsz,wght,FILL,GRAD@20..48,300..600,0..1,-50..200" rel="stylesheet">
<style>
:root{
  --mint:#7ECFC0; --mint-600:#63BBAA; --mint-700:#4FA694; --mint-soft:#E3F6F2; --mint-pale:#F3FAF9;
  --ink:#173832; --text:#3C5450; --muted:#8AA29D; --border:#DEEFEB;
  --white:#FFFFFF; --danger:#E2685C; --danger-soft:#FBEAE8; --warning:#E8B84B; --warning-soft:#FCF3E0;
  --gold:#D8A83E; --shadow:0 4px 18px rgba(23,56,50,.07); --shadow-lg:0 12px 32px rgba(23,56,50,.14);
  --radius:16px; --radius-sm:10px; --sidebar-w:248px; --topbar-h:64px;
}
*{box-sizing:border-box;}
html,body{margin:0;padding:0;height:100%;}
body{
  font-family:'Roboto',system-ui,-apple-system,sans-serif; background:var(--mint-pale); color:var(--text);
  -webkit-font-smoothing:antialiased; overflow-x:hidden;
}
.material-symbols-outlined{font-variation-settings:'FILL' 0,'wght' 500,'GRAD' 0,'opsz' 24; font-size:22px; line-height:1; user-select:none;}
h1,h2,h3,h4{color:var(--ink); margin:0; font-weight:700;}
p{margin:0;}
a{color:inherit;text-decoration:none;}
button{font-family:inherit; cursor:pointer;}
input,textarea,select{font-family:inherit;}
::-webkit-scrollbar{width:8px;height:8px;}
::-webkit-scrollbar-thumb{background:var(--mint-soft);border-radius:8px;}
:focus-visible{outline:2px solid var(--mint-700); outline-offset:2px;}

/* ---------- utility ---------- */
.btn{display:inline-flex;align-items:center;justify-content:center;gap:6px;border:none;border-radius:12px;padding:11px 18px;font-weight:600;font-size:14px;transition:.15s;white-space:nowrap;}
.btn-primary{background:var(--mint);color:var(--ink);}
.btn-primary:hover{background:var(--mint-600);}
.btn-primary:disabled{opacity:.55;cursor:not-allowed;}
.btn-ghost{background:transparent;color:var(--text);border:1px solid var(--border);}
.btn-ghost:hover{background:var(--mint-pale);}
.btn-danger{background:var(--danger-soft);color:var(--danger);}
.btn-danger:hover{background:var(--danger);color:#fff;}
.btn-sm{padding:7px 12px;font-size:13px;border-radius:9px;}
.btn-block{width:100%;}
.btn-icon{padding:9px;border-radius:10px;background:transparent;color:var(--text);}
.btn-icon:hover{background:var(--mint-soft);}
.card{background:var(--white);border:1px solid var(--border);border-radius:var(--radius);box-shadow:var(--shadow);padding:20px;}
.card-title{display:flex;align-items:center;gap:8px;font-size:15px;font-weight:700;color:var(--ink);margin-bottom:14px;}
.card-title .material-symbols-outlined{color:var(--mint-700);}
.pill{display:inline-flex;align-items:center;gap:4px;padding:4px 10px;border-radius:999px;font-size:12px;font-weight:600;background:var(--mint-soft);color:var(--mint-700);}
.pill-warning{background:var(--warning-soft);color:#9A7318;}
.pill-danger{background:var(--danger-soft);color:var(--danger);}
.pill-muted{background:var(--mint-pale);color:var(--muted);}
.grid{display:grid;gap:16px;}
.grid-2{grid-template-columns:1fr 1fr;}
.grid-3{grid-template-columns:repeat(3,1fr);}
.row{display:flex;align-items:center;}
.between{justify-content:space-between;}
.gap-8{gap:8px;} .gap-12{gap:12px;} .gap-16{gap:16px;}
.muted{color:var(--muted);font-size:13px;}
.empty{text-align:center;color:var(--muted);padding:40px 20px;font-size:14px;}
.empty .material-symbols-outlined{font-size:38px;display:block;margin:0 auto 10px;opacity:.5;}
.field{margin-bottom:14px;}
.field label{display:block;font-size:13px;font-weight:600;color:var(--ink);margin-bottom:6px;}
.field input,.field textarea,.field select{width:100%;padding:11px 13px;border:1.5px solid var(--border);border-radius:10px;font-size:14px;background:#fff;color:var(--text);transition:.15s;}
.field input:focus,.field textarea:focus,.field select:focus{border-color:var(--mint);outline:none;}
.field textarea{resize:vertical;min-height:80px;}
.hint{font-size:12px;color:var(--muted);margin-top:5px;}
.divider{height:1px;background:var(--border);margin:16px 0;}
.tabs{display:flex;gap:4px;background:var(--mint-pale);border-radius:12px;padding:4px;margin-bottom:18px;overflow-x:auto;}
.tab{padding:9px 16px;border-radius:9px;border:none;background:transparent;color:var(--muted);font-weight:600;font-size:13.5px;white-space:nowrap;}
.tab.active{background:#fff;color:var(--ink);box-shadow:var(--shadow);}
.avatar{width:40px;height:40px;border-radius:50%;background:var(--mint);color:var(--ink);display:flex;align-items:center;justify-content:center;font-weight:700;font-size:15px;flex-shrink:0;object-fit:cover;}
.avatar-lg{width:76px;height:76px;font-size:26px;}
.skeleton{background:linear-gradient(90deg,var(--mint-pale) 25%,var(--mint-soft) 37%,var(--mint-pale) 63%);background-size:400% 100%;animation:shimmer 1.4s infinite;border-radius:8px;}
@keyframes shimmer{0%{background-position:100% 0}100%{background-position:0 0}}
.badge-dot{width:9px;height:9px;border-radius:50%;background:var(--muted);display:inline-block;flex-shrink:0;}
.badge-dot.online{background:#4CAF7D;box-shadow:0 0 0 3px rgba(76,175,125,.2);}
.link-btn{background:none;border:none;color:var(--mint-700);font-weight:600;font-size:13px;padding:0;cursor:pointer;}

/* ---------- auth screen ---------- */
.auth-wrap{min-height:100vh;display:flex;align-items:center;justify-content:center;padding:20px;
  background:linear-gradient(160deg,var(--mint) 0%,var(--mint-700) 100%);}
.auth-card{background:#fff;border-radius:20px;box-shadow:var(--shadow-lg);padding:36px 32px;width:100%;max-width:400px;}
.auth-logo{display:flex;flex-direction:column;align-items:center;gap:8px;margin-bottom:26px;}
.auth-logo .material-symbols-outlined{font-size:40px;color:var(--mint-700);background:var(--mint-soft);padding:14px;border-radius:16px;}
.auth-logo h1{font-size:24px;letter-spacing:.5px;}
.auth-logo .tag{font-size:12px;color:var(--muted);font-weight:600;}
.auth-toggle{text-align:center;margin-top:18px;font-size:13.5px;color:var(--muted);}

/* ---------- app shell ---------- */
#topbar{height:var(--topbar-h);background:var(--mint);display:flex;align-items:center;gap:14px;padding:0 18px;position:sticky;top:0;z-index:30;box-shadow:0 2px 10px rgba(23,56,50,.08);}
.topbar-logo{display:flex;align-items:center;gap:9px;font-weight:700;font-size:18px;color:var(--ink);}
.topbar-logo .material-symbols-outlined{font-size:26px;}
.hamburger{display:none;}
.topbar-spacer{flex:1;}
.xp-chip{display:flex;align-items:center;gap:8px;background:rgba(255,255,255,.55);padding:6px 12px 6px 6px;border-radius:999px;}
.xp-chip .lvl-badge{background:var(--ink);color:var(--mint);font-weight:700;font-size:11.5px;padding:3px 8px;border-radius:999px;}
.xp-bar-mini{width:74px;height:6px;background:rgba(255,255,255,.6);border-radius:99px;overflow:hidden;}
.xp-bar-mini > div{height:100%;background:var(--ink);border-radius:99px;}
.notif-btn{position:relative;}
.notif-dot{position:absolute;top:5px;right:6px;background:var(--danger);color:#fff;font-size:10px;font-weight:700;min-width:16px;height:16px;border-radius:99px;display:flex;align-items:center;justify-content:center;padding:0 3px;}
.user-chip{display:flex;align-items:center;gap:8px;padding:5px 10px 5px 5px;border-radius:999px;background:rgba(255,255,255,.4);}
.user-chip .avatar{width:32px;height:32px;font-size:12.5px;background:var(--ink);color:var(--mint);}
.user-chip span{font-weight:600;font-size:13.5px;color:var(--ink);}

#shell{display:flex;align-items:flex-start;}
#sidebar{width:var(--sidebar-w);flex-shrink:0;background:#fff;border-right:1px solid var(--border);min-height:calc(100vh - var(--topbar-h));padding:18px 12px 90px;position:sticky;top:var(--topbar-h);overflow-y:auto;max-height:calc(100vh - var(--topbar-h));}
.nav-group-label{font-size:11px;font-weight:700;color:var(--muted);letter-spacing:.08em;text-transform:uppercase;padding:14px 12px 6px;}
.nav-item{display:flex;align-items:center;gap:12px;padding:10px 12px;border-radius:11px;color:var(--text);font-weight:500;font-size:14px;margin-bottom:2px;position:relative;}
.nav-item .material-symbols-outlined{font-size:20px;color:var(--muted);}
.nav-item:hover{background:var(--mint-pale);}
.nav-item.active{background:var(--mint-soft);color:var(--ink);font-weight:700;}
.nav-item.active .material-symbols-outlined{color:var(--mint-700);}
.nav-item .nav-badge{margin-left:auto;background:var(--danger);color:#fff;font-size:10px;font-weight:700;min-width:17px;height:17px;border-radius:99px;display:flex;align-items:center;justify-content:center;padding:0 4px;}
#sidebar-overlay{display:none;}

#content{flex:1;min-width:0;padding:22px 26px 100px;max-width:1180px;margin:0 auto;width:100%;}
.view-header{margin-bottom:18px;}
.view-header h2{font-size:21px;display:flex;align-items:center;gap:9px;}
.view-header h2 .material-symbols-outlined{color:var(--mint-700);font-size:24px;}
.view-header p{color:var(--muted);font-size:13.5px;margin-top:4px;}

.bottom-nav{display:none;}

/* ---------- greeting / dashboard ---------- */
.greeting-banner{background:linear-gradient(120deg,var(--mint),var(--mint-600));border-radius:var(--radius);padding:20px 22px;display:flex;align-items:center;gap:14px;color:var(--ink);margin-bottom:18px;}
.greeting-banner .material-symbols-outlined{font-size:30px;}
.mood-picker{display:flex;justify-content:space-between;gap:6px;}
.mood-opt{flex:1;display:flex;flex-direction:column;align-items:center;gap:4px;padding:10px 4px;border-radius:12px;border:2px solid transparent;background:var(--mint-pale);font-size:26px;}
.mood-opt:hover{background:var(--mint-soft);}
.mood-opt.selected{border-color:var(--mint-700);background:var(--mint-soft);}
.mood-opt small{font-size:10px;color:var(--muted);font-weight:600;}
.stat-trio{display:grid;grid-template-columns:repeat(3,1fr);text-align:center;gap:8px;}
.stat-trio .num{font-size:24px;font-weight:900;color:var(--ink);}
.stat-trio .lbl{font-size:11.5px;color:var(--muted);font-weight:600;}
.module-grid{display:grid;grid-template-columns:repeat(3,1fr);gap:14px;}
.module-card{background:var(--mint-pale);border:1px solid var(--border);border-radius:14px;padding:18px;display:flex;flex-direction:column;gap:10px;align-items:flex-start;transition:.15s;}
.module-card:hover{background:var(--mint-soft);transform:translateY(-2px);}
.module-card .material-symbols-outlined{font-size:26px;background:#fff;padding:9px;border-radius:11px;color:var(--mint-700);}
.module-card span.lbl{font-weight:700;font-size:14px;color:var(--ink);}
.cvv-banner{background:var(--ink);color:#fff;border-radius:var(--radius);padding:16px 20px;display:flex;align-items:center;gap:14px;margin-top:18px;}
.cvv-banner .material-symbols-outlined{font-size:26px;color:var(--mint);}
.cvv-banner b{font-size:20px;}
.xp-progress-row{display:flex;justify-content:space-between;font-size:12px;color:var(--muted);margin:4px 0 6px;}
.xp-bar{height:10px;border-radius:99px;background:var(--mint-pale);overflow:hidden;}
.xp-bar>div{height:100%;background:linear-gradient(90deg,var(--mint),var(--mint-700));border-radius:99px;transition:width .4s;}

/* ---------- lists ---------- */
.list-item{display:flex;align-items:center;gap:12px;padding:12px 10px;border-bottom:1px solid var(--border);}
.list-item:last-child{border-bottom:none;}
.list-item .meta{flex:1;min-width:0;}
.list-item .meta .title{font-weight:600;font-size:14px;color:var(--ink);}
.list-item .meta .sub{font-size:12.5px;color:var(--muted);white-space:nowrap;overflow:hidden;text-overflow:ellipsis;}
.list-item .actions{display:flex;gap:6px;flex-shrink:0;}

/* ---------- chat ---------- */
.chat-shell{display:flex;height:calc(100vh - var(--topbar-h) - 150px);min-height:420px;background:#fff;border:1px solid var(--border);border-radius:var(--radius);overflow:hidden;}
.chat-rooms{width:230px;border-right:1px solid var(--border);overflow-y:auto;flex-shrink:0;background:var(--mint-pale);}
.chat-room-item{padding:12px 14px;border-bottom:1px solid var(--border);cursor:pointer;display:flex;gap:10px;align-items:center;}
.chat-room-item:hover,.chat-room-item.active{background:var(--mint-soft);}
.chat-main{flex:1;display:flex;flex-direction:column;min-width:0;}
.chat-messages{flex:1;overflow-y:auto;padding:16px;display:flex;flex-direction:column;gap:10px;}
.msg-row{display:flex;gap:8px;max-width:78%;}
.msg-row.mine{align-self:flex-end;flex-direction:row-reverse;}
.msg-bubble{background:var(--mint-pale);padding:9px 13px;border-radius:14px;font-size:13.8px;line-height:1.45;}
.msg-row.mine .msg-bubble{background:var(--mint);color:var(--ink);}
.msg-meta{font-size:10.5px;color:var(--muted);margin-top:3px;}
.chat-input-row{display:flex;gap:8px;padding:12px;border-top:1px solid var(--border);}
.chat-input-row input{flex:1;}
.conn-dot{width:7px;height:7px;border-radius:50%;background:var(--danger);display:inline-block;}
.conn-dot.on{background:#4CAF7D;}

/* ---------- breathing ---------- */
.breathe-stage{display:flex;flex-direction:column;align-items:center;gap:18px;padding:30px 10px;}
.breathe-circle{width:160px;height:160px;border-radius:50%;background:radial-gradient(circle at 35% 30%,var(--mint-soft),var(--mint));display:flex;align-items:center;justify-content:center;flex-direction:column;color:var(--ink);font-weight:700;transition:transform 1s ease-in-out;box-shadow:0 0 0 10px var(--mint-pale);}
.breathe-circle .phase{font-size:13px;letter-spacing:.05em;text-transform:uppercase;}
.breathe-circle .secs{font-size:30px;}
.breathe-scale-in{transform:scale(1.35);} .breathe-scale-out{transform:scale(.78);} .breathe-scale-hold{transform:scale(1.1);}

/* ---------- misc widgets ---------- */
.toast-container{position:fixed;top:16px;right:16px;z-index:1000;display:flex;flex-direction:column;gap:8px;}
.toast{display:flex;align-items:center;gap:10px;background:var(--ink);color:#fff;padding:12px 16px;border-radius:12px;box-shadow:var(--shadow-lg);font-size:13.5px;opacity:0;transform:translateX(20px);transition:.25s;max-width:340px;}
.toast.show{opacity:1;transform:translateX(0);}
.toast-success .material-symbols-outlined{color:#7BE0A6;}
.toast-error{background:#5C2A26;} .toast-error .material-symbols-outlined{color:#F3A79E;}
.toast-warning .material-symbols-outlined{color:var(--warning);}

.modal-backdrop{position:fixed;inset:0;background:rgba(23,56,50,.45);display:flex;align-items:center;justify-content:center;z-index:900;padding:16px;backdrop-filter:blur(2px);}
.modal-box{background:#fff;border-radius:18px;padding:26px;position:relative;width:100%;max-height:88vh;overflow-y:auto;box-shadow:var(--shadow-lg);}
.modal-close{position:absolute;top:12px;right:12px;}

.cold-start-hint{position:fixed;bottom:18px;left:50%;transform:translateX(-50%);background:var(--ink);color:#fff;padding:10px 18px;border-radius:99px;display:flex;align-items:center;gap:10px;font-size:12.5px;z-index:1100;box-shadow:var(--shadow-lg);}
.spinner{width:15px;height:15px;border-radius:50%;border:2px solid rgba(255,255,255,.35);border-top-color:#fff;animation:spin .7s linear infinite;flex-shrink:0;}
@keyframes spin{to{transform:rotate(360deg);}}
.spinner-lg{width:34px;height:34px;border:3px solid var(--mint-soft);border-top-color:var(--mint-700);border-radius:50%;animation:spin .8s linear infinite;margin:30px auto;}

/* ---------- responsive ---------- */
@media (max-width: 1023px){
  #sidebar{position:fixed;left:-260px;top:var(--topbar-h);height:calc(100vh - var(--topbar-h));z-index:60;transition:left .22s ease;box-shadow:var(--shadow-lg);}
  #sidebar.open{left:0;}
  #sidebar-overlay{display:none;position:fixed;inset:var(--topbar-h) 0 0 0;background:rgba(23,56,50,.4);z-index:55;}
  #sidebar-overlay.show{display:block;}
  .hamburger{display:flex;}
  .user-chip span{display:none;}
}
@media (max-width: 900px){
  .grid-2{grid-template-columns:1fr;} .grid-3{grid-template-columns:1fr 1fr;}
  .module-grid{grid-template-columns:repeat(2,1fr);}
}
@media (max-width: 640px){
  #content{padding:16px 12px 90px;}
  .stat-trio .num{font-size:19px;}
  .grid-3{grid-template-columns:1fr;}
  .module-grid{grid-template-columns:repeat(2,1fr);}
  .xp-chip span.xp-text{display:none;}
  .bottom-nav{display:flex;position:fixed;bottom:0;left:0;right:0;height:60px;background:#fff;border-top:1px solid var(--border);z-index:50;box-shadow:0 -4px 14px rgba(23,56,50,.08);}
  .bottom-nav a{flex:1;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:2px;color:var(--muted);font-size:10px;font-weight:600;}
  .bottom-nav a.active{color:var(--mint-700);}
  .bottom-nav .material-symbols-outlined{font-size:22px;}
  #content{padding-bottom:88px;}
  .auth-card{padding:28px 22px;}
}
</style>
</head>
<body>
<div id="root"></div>
<div id="toast-container"></div>
<div id="modal-root"></div>
<script src="https://cdn.jsdelivr.net/npm/sockjs-client@1.6.1/dist/sockjs.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/@stomp/stompjs@7.0.0/bundles/stomp.umd.min.js"></script>
<script>
'use strict';
/* =========================================================================
   MIB — Frontend único (HTML+CSS+JS puro), continuação do BMO.
   Backend: https://mib-backend-7p5h.onrender.com  (Java 21 + Spring Boot 3)
   ========================================================================= */

/* ---------- CONFIG ---------- */
const CONFIG = {
  API_BASE: 'https://mib-backend-7p5h.onrender.com/api',
  WS_URL:   'https://mib-backend-7p5h.onrender.com/ws',
  CVV_PHONE: '188'
};

/* Nomes de enum do backend Java — o README não expõe o JSON exato, então
   assumi convenções comuns (SCREAMING_SNAKE_CASE). Se o backend usar nomes
   diferentes, ajuste só aqui. */
const ENUMS = {
  mood: [
    {value:'MUITO_TRISTE', emoji:'😢', label:'Muito triste'},
    {value:'TRISTE',       emoji:'😕', label:'Triste'},
    {value:'NORMAL',       emoji:'😊', label:'Normal'},
    {value:'BEM',          emoji:'😄', label:'Bem'},
    {value:'MUITO_BEM',    emoji:'🤩', label:'Muito bem'}
  ],
  taskStatus: {PENDING:'Pendente', IN_PROGRESS:'Em progresso', COMPLETED:'Concluída'},
  reportReasons: [
    {value:'BULLYING', label:'Bullying'}, {value:'SPAM', label:'Spam'},
    {value:'HARASSMENT', label:'Assédio'}, {value:'OFFENSIVE_CONTENT', label:'Conteúdo ofensivo'},
    {value:'FAKE_NEWS', label:'Fake news'}, {value:'OTHER', label:'Outro'}
  ],
  shopItemTypes: {FRAME:'Moldura',BACKGROUND:'Fundo',ICON:'Ícone',BADGE:'Emblema',TITLE:'Título',EFFECT:'Efeito',THEME:'Tema'},
  visibility: {PUBLIC:'Público', PRIVATE:'Privado'}
};

/* ---------- STATE (em memória — sem localStorage, ver observação no chat) ---------- */
const state = {
  accessToken: null, refreshToken: null, user: null,
  route: 'login', routeParam: null, sidebarOpen: false,
  notifUnread: 0, notifOpen: false,
  cache: {}, // caches simples por tela
  ws: { client: null, connected: false, subs: {} }
};

/* ---------- helpers genéricos ---------- */
const $ = (sel, el=document) => el.querySelector(sel);
const $$ = (sel, el=document) => Array.from(el.querySelectorAll(sel));
const esc = (s) => (s===undefined||s===null) ? '' : String(s).replace(/[&<>"']/g, c => ({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[c]));
const initials = (name) => (name||'?').trim().split(/\s+/).slice(0,2).map(w=>w[0]).join('').toUpperCase();
function fmtDate(d){ if(!d) return ''; const dt = new Date(d); if(isNaN(dt)) return d; return dt.toLocaleDateString('pt-BR',{day:'2-digit',month:'2-digit',year:'numeric'}); }
function fmtTime(d){ if(!d) return ''; const dt = new Date(d); if(isNaN(dt)) return ''; return dt.toLocaleTimeString('pt-BR',{hour:'2-digit',minute:'2-digit'}); }
function fmtDateTime(d){ if(!d) return ''; const dt = new Date(d); if(isNaN(dt)) return d; return dt.toLocaleString('pt-BR',{day:'2-digit',month:'2-digit',hour:'2-digit',minute:'2-digit'}); }
function timeAgo(d){
  if(!d) return '';
  const s = Math.floor((Date.now() - new Date(d).getTime())/1000);
  if(s<60) return 'agora'; if(s<3600) return Math.floor(s/60)+'min'; if(s<86400) return Math.floor(s/3600)+'h';
  if(s<604800) return Math.floor(s/86400)+'d'; return fmtDate(d);
}
function debounce(fn, ms){ let t; return (...a)=>{ clearTimeout(t); t=setTimeout(()=>fn(...a), ms); }; }

/* ---------- API ---------- */
let refreshPromise = null;
async function apiRaw(path, opts={}){
  const headers = Object.assign({}, opts.headers||{});
  const isForm = opts.body instanceof FormData;
  if(!isForm && opts.body) headers['Content-Type'] = 'application/json';
  if(state.accessToken) headers['Authorization'] = 'Bearer ' + state.accessToken;
  const res = await fetch(CONFIG.API_BASE + path, {
    method: opts.method || 'GET',
    headers,
    body: isForm ? opts.body : (opts.body ? JSON.stringify(opts.body) : undefined)
  });
  return res;
}
async function tryRefresh(){
  if(!state.refreshToken) return false;
  if(refreshPromise) return refreshPromise;
  refreshPromise = (async ()=>{
    try{
      const res = await fetch(CONFIG.API_BASE + '/auth/refresh', {
        method:'POST', headers:{'Content-Type':'application/json'},
        body: JSON.stringify({ refreshToken: state.refreshToken })
      });
      if(!res.ok) return false;
      const data = await res.json();
      applyAuthPayload(data, {keepUser:true});
      return true;
    }catch(e){ return false; } finally{ refreshPromise = null; }
  })();
  return refreshPromise;
}
/**
 * api() principal — trata: acordar servidor free-tier (Render), 401 com
 * retry via refresh token, parsing de erro amigável, e devolve JSON (ou null se 204).
 */
async function api(path, opts={}){
  const wake = renderColdStartHintIfNeeded();
  let res;
  try{
    res = await apiRaw(path, opts);
  }catch(networkErr){
    hideColdStartHint(wake);
    throw new ApiError('Não foi possível conectar ao servidor. O backend pode estar iniciando (Render free tier) — tente novamente em alguns segundos.', 0);
  }
  hideColdStartHint(wake);
  if(res.status === 401 && state.refreshToken && !opts._retried){
    const ok = await tryRefresh();
    if(ok) return api(path, Object.assign({}, opts, {_retried:true}));
    logout(true);
    throw new ApiError('Sessão expirada. Faça login novamente.', 401);
  }
  if(!res.ok){
    let msg = 'Erro ao comunicar com o servidor ('+res.status+').';
    try{ const errData = await res.json(); msg = errData.message || errData.error || msg; }catch(e){}
    throw new ApiError(msg, res.status);
  }
  if(res.status === 204) return null;
  try{ return await res.json(); }catch(e){ return null; }
}
class ApiError extends Error{ constructor(msg, status){ super(msg); this.status = status; } }
let coldStartTimer = null;
function renderColdStartHintIfNeeded(){
  const el = document.createElement('div');
  coldStartTimer = setTimeout(()=>{
    el.className = 'cold-start-hint';
    el.innerHTML = '<div class="spinner"></div><span>Acordando o servidor (Render free tier pode levar até 1 min)…</span>';
    document.body.appendChild(el);
  }, 2500);
  return el;
}
function hideColdStartHint(el){ clearTimeout(coldStartTimer); if(el && el.parentNode) el.remove(); }

function applyAuthPayload(data, opts={}){
  state.accessToken = data.accessToken || data.access_token || data.token || state.accessToken;
  state.refreshToken = data.refreshToken || data.refresh_token || state.refreshToken;
  if(!opts.keepUser && data.user) state.user = normalizeUser(data.user);
  else if(data.user) state.user = normalizeUser(data.user);
}
function normalizeUser(u){
  if(!u) return u;
  u.displayName = u.displayName || u.name || u.username;
  u.roles = u.roles || u.authorities || [];
  return u;
}
function isAdmin(){ return !!(state.user && state.user.roles && state.user.roles.some(r => String(r).toUpperCase().includes('ADMIN'))); }

/* ---------- AUTH FLOWS ---------- */
async function doLogin(identifier, password, btn){
  btn.disabled = true; btn.textContent = 'Entrando...';
  try{
    const data = await api('/auth/login', {method:'POST', body:{ identifier, email: identifier, username: identifier, password }});
    applyAuthPayload(data);
    if(!state.user){ await fetchMe(); }
    toast('Bem-vindo de volta, '+ (state.user?.displayName||'') +'!', 'success');
    navigate('dashboard');
    connectSocket();
    refreshNotifCount();
  }catch(e){
    toast(e.message || 'Não foi possível entrar.', 'error');
  }finally{
    btn.disabled = false; btn.textContent = 'Entrar';
  }
}
async function doRegister(name, email, password, btn){
  btn.disabled = true; btn.textContent = 'Cadastrando...';
  try{
    const data = await api('/auth/register', {method:'POST', body:{ name, displayName:name, username:name, email, password }});
    if(data && (data.accessToken || data.access_token)){
      applyAuthPayload(data);
      if(!state.user) await fetchMe();
      toast('Conta criada! Bem-vindo ao MIB.', 'success');
      navigate('dashboard'); connectSocket(); refreshNotifCount();
    }else{
      toast('Conta criada! Faça login para continuar.', 'success');
      state.route = 'login'; renderRoot();
    }
  }catch(e){
    toast(e.message || 'Não foi possível criar a conta.', 'error');
  }finally{
    btn.disabled = false; btn.textContent = 'Cadastrar';
  }
}
async function fetchMe(){
  try{ const me = await api('/profile/me'); state.user = normalizeUser(me); }catch(e){ /* ignore */ }
}
async function logout(silent){
  try{ if(!silent) await api('/auth/logout', {method:'POST', body:{ refreshToken: state.refreshToken }}); }catch(e){}
  disconnectSocket();
  state.accessToken = null; state.refreshToken = null; state.user = null; state.route = 'login'; state.cache = {};
  renderRoot();
  if(!silent) toast('Você saiu da sua conta.', 'info');
}

async function loadInto(id, fetcher, renderer, afterRender){
  try{
    const data = await fetcher();
    const el = document.getElementById(id);

    el.innerHTML = renderer(data);

    if(el) el.innerHTML = '<div class="empty"><span class="material-symbols-outlined">error</span>'+esc(e.message||'Erro ao carregar.')+'</div>';
  }
}

function wire_ai(){
  loadInto('ai-messages', async ()=>{
    const data = await api('/ai/conversation').catch(()=>({content:[]}));
    return Array.isArray(data) ? data : (data?.content || []);
  }, (msgs)=>{
    if(!msgs.length) return '<div class="empty"><span class="material-symbols-outlined">smart_toy</span>Olá! Sou a IA do MIB. Como você está se sentindo hoje?</div>';
    return msgs.map(aiBubble).join('');
  });
  const send = async ()=>{
    const input = $('#ai-input'); const text = input.value.trim(); if(!text) return;
    input.value=''; const box = $('#ai-messages');
    if(box) box.insertAdjacentHTML('beforeend', aiBubble({role:'USER', content:text, createdAt:new Date()}));
    if(box) box.scrollTop = box.scrollHeight;
    try{
      const reply = await api('/ai/conversation/messages', {method:'POST', body:{content:text, message:text}});
      const replyText = reply?.content || reply?.message || reply?.reply || '';
      if(box) box.insertAdjacentHTML('beforeend', aiBubble({role:'AI', content:replyText, createdAt:new Date()}));
      if(box) box.scrollTop = box.scrollHeight;
    }catch(e){
      toast(e.status===429 ? 'Limite de mensagens por hora atingido. Tente novamente mais tarde.' : (e.message||'Erro ao enviar mensagem.'), 'error');
    }
  };
  const sendBtn = $('#ai-send'); if(sendBtn) sendBtn.addEventListener('click', send);
  const input = $('#ai-input'); if(input) input.addEventListener('keydown', (e)=>{ if(e.key==='Enter') send(); });
  const clearBtn = $('#ai-clear'); if(clearBtn) clearBtn.addEventListener('click', ()=>{
    confirmModal('Apagar conversa', 'Isso apaga todo o histórico de conversa com a IA. Deseja continuar?', async ()=>{
      try{ await api('/ai/conversation', {method:'DELETE'}); toast('Conversa apagada.','success'); rerenderContent(); }catch(e){ toast(e.message,'error'); }
    }, 'Apagar');
  });
}

/* =========================================================
   VIEW: CHAT (Geral / Privado / Salas temáticas) — STOMP+SockJS com fallback REST
   ========================================================= */
const chatState = { tab:'general', currentRoomId:null, currentRoomLabel:'', friendsCache:null, themeCache:null };
function ViewChat(){
  return '<div class="view-header"><h2><span class="material-symbols-outlined">chat</span>Chat <span class="conn-dot'+(state.ws.connected?' on':'')+'" id="conn-dot" title="'+(state.ws.connected?'Conectado em tempo real':'Modo offline (REST)')+'"></span></h2><p>Sala geral, conversas privadas e salas temáticas.</p></div>'+
  '<div class="tabs">'+
    '<button class="tab'+(chatState.tab==='general'?' active':'')+'" data-chat-tab="general">Geral</button>'+
    '<button class="tab'+(chatState.tab==='direct'?' active':'')+'" data-chat-tab="direct">Privado</button>'+
    '<button class="tab'+(chatState.tab==='theme'?' active':'')+'" data-chat-tab="theme">Salas temáticas</button>'+
  '</div>'+
  '<div class="chat-shell">'+
    (chatState.tab==='general' ? '<div class="chat-main" style="width:100%;">'+chatMessagesArea()+'</div>' :
      '<div class="chat-rooms" id="chat-room-list">'+SPIN+'</div><div class="chat-main">'+chatMessagesArea()+'</div>')+
  '</div>';
}
function chatMessagesArea(){
  return '<div class="chat-messages" id="chat-messages">'+(chatState.tab==='general'?SPIN:'<div class="empty"><span class="material-symbols-outlined">forum</span>Selecione uma sala para começar</div>')+'</div>'+
  '<div class="chat-input-row"><input type="text" id="chat-input" placeholder="Digite sua mensagem..." '+((chatState.tab!=='general' && !chatState.currentRoomId)?'disabled':'')+' maxlength="1000">'+
    '<button class="btn btn-primary" id="chat-send" '+((chatState.tab!=='general' && !chatState.currentRoomId)?'disabled':'')+'><span class="material-symbols-outlined">send</span></button></div>';
}
function chatBubble(m){
  const mine = String(m.senderId||m.userId||m.authorId) === String(state.user?.id);
  const author = mine ? 'Você' : (m.senderName||m.authorName||m.username||'—');
  return '<div class="msg-row'+(mine?' mine':'')+'"><div>'+(mine?'':'<div class="msg-meta">'+esc(author)+'</div>')+'<div class="msg-bubble">'+esc(m.content||m.message||'').replace(/\n/g,'<br>')+'</div><div class="msg-meta">'+fmtTime(m.createdAt||m.timestamp)+'</div></div></div>';
}
async function openGeneralRoom(){
  try{
    const room = await api('/chat/general/room');
    chatState.currentRoomId = room?.id || room?.roomId || room;
    await loadRoomMessages(chatState.currentRoomId);
    subscribeRoom(chatState.currentRoomId);
  }catch(e){
    const el = $('#chat-messages'); if(el) el.innerHTML = '<div class="empty"><span class="material-symbols-outlined">error</span>'+esc(e.message)+'</div>';
  }
}
async function loadRoomMessages(roomId){
  const el = $('#chat-messages'); if(el) el.innerHTML = SPIN;
  try{
    const data = await api('/chat/rooms/'+roomId+'/messages');
    const msgs = Array.isArray(data)?data:(data?.content||[]);
    if(el) el.innerHTML = msgs.length ? msgs.map(chatBubble).join('') : '<div class="empty"><span class="material-symbols-outlined">forum</span>Nenhuma mensagem ainda. Diga oi!</div>';
    if(el) el.scrollTop = el.scrollHeight;
  }catch(e){
    if(el) el.innerHTML = '<div class="empty"><span class="material-symbols-outlined">error</span>'+esc(e.message)+'</div>';
  }
}
function subscribeRoom(roomId){
  if(!state.ws.client || !state.ws.connected) return;
  Object.keys(state.ws.subs).filter(k=>k.startsWith('room:')).forEach(k=>{ try{state.ws.subs[k].unsubscribe();}catch(e){} delete state.ws.subs[k]; });
  const key = 'room:'+roomId;
  state.ws.subs[key] = state.ws.client.subscribe('/topic/chat.room.'+roomId, (frame)=>{
    try{
      const m = JSON.parse(frame.body);
      const el = $('#chat-messages');
      if(el){ el.insertAdjacentHTML('beforeend', chatBubble(m)); el.scrollTop = el.scrollHeight; }
    }catch(e){}
  });
}
function wire_chat(){
  $$('[data-chat-tab]').forEach(t=>t.addEventListener('click', ()=>{
    chatState.tab = t.getAttribute('data-chat-tab'); chatState.currentRoomId=null; rerenderContent();
    if(chatState.tab==='general') openGeneralRoom();
    else if(chatState.tab==='direct') loadDirectRoomList();
    else loadThemeRoomList();
  }));
  if(chatState.tab==='general') openGeneralRoom();
  else if(chatState.tab==='direct') loadDirectRoomList();
  else loadThemeRoomList();

  const sendFn = async ()=>{
    const input = $('#chat-input'); const text = input.value.trim();
    if(!text || !chatState.currentRoomId) return;
    input.value = '';
    try{
      if(state.ws.connected && state.ws.client){
        state.ws.client.publish({destination:'/app/chat.room/'+chatState.currentRoomId, body: JSON.stringify({content:text})});
        // otimista: mostra local, servidor confirma via broadcast (pode duplicar se o backend ecoar pro remetente — aceitável)
      }else{
        const m = await api('/chat/rooms/'+chatState.currentRoomId+'/messages', {method:'POST', body:{content:text}});
        const el = $('#chat-messages'); if(el){ el.insertAdjacentHTML('beforeend', chatBubble(m||{content:text,senderId:state.user.id,createdAt:new Date()})); el.scrollTop = el.scrollHeight; }
      }
    }catch(e){ toast(e.message,'error'); }
  };
  const sb = $('#chat-send'); if(sb) sb.addEventListener('click', sendFn);
  const ci = $('#chat-input'); if(ci) ci.addEventListener('keydown', (e)=>{ if(e.key==='Enter') sendFn(); });
}
async function loadDirectRoomList(){
  const el = $('#chat-room-list'); if(!el) return;
  try{
    const list = await api('/chat/direct');
    const rooms = Array.isArray(list)?list:(list?.content||[]);
    el.innerHTML = rooms.length ? rooms.map(r=>{
      const name = r.friendDisplayName || r.friendName || r.username || 'Conversa';
      return '<div class="chat-room-item" data-open-direct="'+(r.friendUserId||r.userId||r.id)+'" data-room-label="'+esc(name)+'"><div class="avatar" style="width:32px;height:32px;font-size:12px;">'+esc(initials(name))+'</div><div class="meta"><div class="title" style="font-size:13px;">'+esc(name)+'</div></div></div>';
    }).join('') : '<div class="empty" style="padding:20px 10px;">Nenhuma conversa ainda.<br><button class="link-btn" data-nav="friends">Ver amigos</button></div>';
    $$('[data-open-direct]', el).forEach(item=>item.addEventListener('click', async ()=>{
      $$('.chat-room-item', el).forEach(x=>x.classList.remove('active')); item.classList.add('active');
      try{
        const room = await api('/chat/direct/'+item.getAttribute('data-open-direct'));
        chatState.currentRoomId = room?.id || room?.roomId;
        const ci = $('#chat-input'); if(ci) ci.disabled=false; const sb=$('#chat-send'); if(sb) sb.disabled=false;
        await loadRoomMessages(chatState.currentRoomId); subscribeRoom(chatState.currentRoomId);
      }catch(e){ toast(e.message,'error'); }
    }));
  }catch(e){ el.innerHTML = '<div class="empty">'+esc(e.message)+'</div>'; }
}
async function loadThemeRoomList(){
  const el = $('#chat-room-list'); if(!el) return;
  try{
    const interests = await api('/interests');
    const list = Array.isArray(interests)?interests:(interests?.content||[]);
    const withRoom = list.filter(i=>i.roomId || i.chatRoomId || i.room);
    el.innerHTML = withRoom.length ? withRoom.map(i=>{
      const rid = i.roomId || i.chatRoomId || (i.room && i.room.id);
      return '<div class="chat-room-item" data-open-room="'+rid+'"><span class="material-symbols-outlined" style="font-size:18px;color:var(--mint-700);">tag</span><div class="meta"><div class="title" style="font-size:13px;">'+esc(i.name||i.label)+'</div></div></div>';
    }).join('') : '<div class="empty" style="padding:20px 10px;">Nenhuma sala temática vinculada aos seus interesses ainda.<br><button class="link-btn" data-nav="interests">Escolher interesses</button></div>';
    $$('[data-open-room]', el).forEach(item=>item.addEventListener('click', async ()=>{
      $$('.chat-room-item', el).forEach(x=>x.classList.remove('active')); item.classList.add('active');
      chatState.currentRoomId = item.getAttribute('data-open-room');
      const ci = $('#chat-input'); if(ci) ci.disabled=false; const sb=$('#chat-send'); if(sb) sb.disabled=false;
      await loadRoomMessages(chatState.currentRoomId); subscribeRoom(chatState.currentRoomId);
    }));
  }catch(e){ el.innerHTML = '<div class="empty">'+esc(e.message)+'</div>'; }
}

function ViewFriends(){

  '<div class="tabs" style="margin-top:18px;">'+
    '<button class="tab'+(friendsState.tab==='list'?' active':'')+'" data-friend-tab="list">Meus amigos</button>'+
    '<button class="tab'+(friendsState.tab==='incoming'?' active':'')+'" data-friend-tab="incoming">Recebidas</button>'+
    '<button class="tab'+(friendsState.tab==='outgoing'?' active':'')+'" data-friend-tab="outgoing">Enviadas</button>'+

function friendRow(f, actionsHtml){
  const name = f.displayName || f.name || f.username || f.friendDisplayName;
  return '<div class="list-item"><div class="avatar">'+esc(initials(name))+'</div>'+
    '<div class="meta"><div class="title">'+esc(name)+' '+(f.online!==undefined?'<span class="badge-dot'+(f.online?' online':'')+'" style="margin-left:4px;"></span>':'')+'</div>'+
    '<div class="sub">'+(f.online ? 'Online agora' : (f.lastSeen ? 'Visto '+timeAgo(f.lastSeen) : (f.mutualInterests? f.mutualInterests+' interesses em comum':'@'+esc(f.username||''))))+'</div></div>'+
    '<div class="actions">'+actionsHtml+'</div></div>';
}
function wire_friends(){
  const search = $('#friend-search');
  const doSearch = debounce(async ()=>{
    const q = search.value.trim(); const box = $('#friend-search-results');
    if(!q){ box.innerHTML=''; return; }
    box.innerHTML = '<div class="card" style="margin-top:10px;">'+SPIN+'</div>';
    try{
      const data = await api('/users/search?query='+encodeURIComponent(q));
      const users = Array.isArray(data)?data:(data?.content||[]);
      box.innerHTML = '<div class="card" style="margin-top:10px;">'+(users.length?users.map(u=>
        friendRow(u, '<button class="btn btn-primary btn-sm" data-add-friend="'+u.id+'">Adicionar</button>')
      ).join(''):'<div class="empty">Nenhum usuário encontrado.</div>')+'</div>';
      $$('[data-add-friend]', box).forEach(b=>b.addEventListener('click', async ()=>{
        try{ await api('/friends/requests/'+b.getAttribute('data-add-friend'), {method:'POST'}); toast('Solicitação enviada!','success'); b.disabled=true; b.textContent='Enviado'; }catch(e){ toast(e.message,'error'); }
      }));
    }catch(e){ box.innerHTML = '<div class="empty">'+esc(e.message)+'</div>'; }
  }, 400);
  if(search) search.addEventListener('input', doSearch);
  $$('[data-friend-tab]').forEach(t=>t.addEventListener('click', ()=>{ friendsState.tab = t.getAttribute('data-friend-tab'); rerenderContent(); }));
  loadFriendsPanel();
}
async function loadFriendsPanel(){
  const panel = $('#friends-panel'); if(!panel) return;
  try{
    if(friendsState.tab==='list'){
      const data = await api('/friends'); const list = Array.isArray(data)?data:(data?.content||[]);
      panel.innerHTML = list.length ? list.map(f=>friendRow(f, '<button class="btn-icon" data-remove-friend="'+(f.friendUserId||f.id)+'" title="Remover"><span class="material-symbols-outlined">person_remove</span></button>')).join('') : '<div class="empty"><span class="material-symbols-outlined">group</span>Você ainda não tem amigos. Busque alguém acima!</div>';
      $$('[data-remove-friend]', panel).forEach(b=>b.addEventListener('click', ()=>confirmModal('Remover amizade','Tem certeza?',async ()=>{ try{ await api('/friends/'+b.getAttribute('data-remove-friend'),{method:'DELETE'}); toast('Amizade removida.','success'); loadFriendsPanel(); }catch(e){toast(e.message,'error');} },'Remover')));
    } else if(friendsState.tab==='incoming'){
      const data = await api('/friends/requests/incoming'); const list = Array.isArray(data)?data:(data?.content||[]);
      panel.innerHTML = list.length ? list.map(f=>friendRow(f, '<button class="btn btn-primary btn-sm" data-accept="'+f.id+'">Aceitar</button><button class="btn btn-ghost btn-sm" data-decline="'+f.id+'">Recusar</button>')).join('') : '<div class="empty">Nenhuma solicitação recebida.</div>';
      $$('[data-accept]', panel).forEach(b=>b.addEventListener('click', async ()=>{ try{ await api('/friends/requests/'+b.getAttribute('data-accept')+'/accept',{method:'POST'}); toast('Amizade aceita!','success'); loadFriendsPanel(); }catch(e){toast(e.message,'error');} }));
      $$('[data-decline]', panel).forEach(b=>b.addEventListener('click', async ()=>{ try{ await api('/friends/requests/'+b.getAttribute('data-decline')+'/decline',{method:'POST'}); toast('Solicitação recusada.','info'); loadFriendsPanel(); }catch(e){toast(e.message,'error');} }));
    } else if(friendsState.tab==='outgoing'){
      const data = await api('/friends/requests/outgoing'); const list = Array.isArray(data)?data:(data?.content||[]);
      panel.innerHTML = list.length ? list.map(f=>friendRow(f, '<button class="btn btn-ghost btn-sm" data-cancel="'+f.id+'">Cancelar</button>')).join('') : '<div class="empty">Nenhuma solicitação enviada.</div>';
      $$('[data-cancel]', panel).forEach(b=>b.addEventListener('click', async ()=>{ try{ await api('/friends/requests/'+b.getAttribute('data-cancel'),{method:'DELETE'}); toast('Solicitação cancelada.','info'); loadFriendsPanel(); }catch(e){toast(e.message,'error');} }));
    } else {
      const data = await api('/recommendations/friends'); const list = Array.isArray(data)?data:(data?.content||[]);
      panel.innerHTML = list.length ? list.map(f=>friendRow(f, '<button class="btn btn-primary btn-sm" data-add-friend2="'+f.id+'">Adicionar</button>')).join('') : '<div class="empty">Sem sugestões no momento — escolha alguns interesses.</div>';
      $$('[data-add-friend2]', panel).forEach(b=>b.addEventListener('click', async ()=>{ try{ await api('/friends/requests/'+b.getAttribute('data-add-friend2'),{method:'POST'}); toast('Solicitação enviada!','success'); b.disabled=true; b.textContent='Enviado'; }catch(e){toast(e.message,'error');} }));
    }
  }catch(e){ panel.innerHTML = '<div class="empty">'+esc(e.message)+'</div>'; }
}

   VIEW: MOOD
   ========================================================= */
function ViewMood(){
  return '<div class="view-header"><h2><span class="material-symbols-outlined">mood</span>Humor</h2><p>Diário de humor — puramente autorrelato, sem julgamento.</p></div>'+
  '<div class="grid grid-2" style="align-items:start;">'+
    '<div class="card"><div class="card-title"><span class="material-symbols-outlined">edit_note</span>Como você está agora?</div><div id="mood-today">'+SPIN+'</div></div>'+
    '<div class="card"><div class="card-title"><span class="material-symbols-outlined">query_stats</span>Histórico (30 dias)</div><div id="mood-history">'+SPIN+'</div></div>'+
  '</div>';
}
function wire_mood(){
  loadInto('mood-today', ()=>api('/mood/today').catch(()=>null), (m)=>{
    const sel = m?m.level:null;
    return '<div class="mood-picker">'+ENUMS.mood.map(x=>'<button class="mood-opt'+(sel===x.value?' selected':'')+'" data-mood2="'+x.value+'">'+x.emoji+'<small>'+x.label+'</small></button>').join('')+'</div>'+
    '<div class="field" style="margin-top:16px;"><label>Nota (opcional)</label><textarea id="mood-note" placeholder="Um espaço só seu, se quiser escrever.">'+esc(m?.note||'')+'</textarea></div>'+
    '<button class="btn btn-primary" id="mood-save-note">Salvar nota</button>';
  });
  const container = $('#mood-today');
  if(container) container.addEventListener('click', async (e)=>{
    const btn = e.target.closest('[data-mood2]'); const saveBtn = e.target.closest('#mood-save-note');
    if(btn){
      try{ await api('/mood', {method:'POST', body:{level:btn.getAttribute('data-mood2')}}); toast('Humor registrado.','success'); wire_mood(); }catch(err){ toast(err.message,'error'); }
    } else if(saveBtn){
      const note = $('#mood-note').value; const level = $('.mood-opt.selected')?.getAttribute('data-mood2');
      try{ await api('/mood', {method:'POST', body:{level, note}}); toast('Nota salva.','success'); }catch(err){ toast(err.message,'error'); }
    }
  });
  loadInto('mood-history', ()=>api('/mood/history?days=30').catch(()=>[]), (hist)=>{
    hist = Array.isArray(hist)?hist:(hist?.content||[]);
    if(!hist.length) return '<div class="empty"><span class="material-symbols-outlined">show_chart</span>Registre seu humor para ver sua evolução aqui!</div>';
    return moodChartSVG(hist);
  });
}
function moodChartSVG(hist){
  const order = ENUMS.mood.map(m=>m.value);
  const pts = hist.slice(-30).map((h,i)=>({x:i, y: order.indexOf(h.level), date:h.date||h.createdAt}));
  const w = 320, h = 130, pad=14;
  const xs = pts.length>1 ? (w-2*pad)/(pts.length-1) : 0;
  const coord = pts.map((p,i)=>[pad+i*xs, h-pad-(p.y/(order.length-1))*(h-2*pad)]);
  const path = coord.map((c,i)=>(i===0?'M':'L')+c[0].toFixed(1)+','+c[1].toFixed(1)).join(' ');
  const dots = coord.map((c,i)=>'<circle cx="'+c[0].toFixed(1)+'" cy="'+c[1].toFixed(1)+'" r="3" fill="#4FA694"><title>'+esc(fmtDate(pts[i].date))+'</title></circle>').join('');
  return '<svg viewBox="0 0 '+w+' '+h+'" style="width:100%;height:auto;"><path d="'+path+'" fill="none" stroke="#7ECFC0" stroke-width="2.5"/>'+dots+'</svg>'+
  '<div class="row between muted" style="font-size:11px;margin-top:4px;"><span>🙁</span><span>😊</span><span>🤩</span></div>';
}

/* =========================================================
   VIEW: BREATHING
   ========================================================= */
const breathState = { technique:null, running:false, phaseIdx:0, timer:null };
function ViewBreathing(){
  return '<div class="view-header"><h2><span class="material-symbols-outlined">air</span>Respiração Guiada</h2><p>Escolha uma técnica e siga o ritmo do círculo.</p></div>'+
  '<div class="grid grid-2" style="align-items:start;">'+
    '<div class="card"><div class="card-title"><span class="material-symbols-outlined">self_improvement</span>Técnicas</div><div id="breathing-list">'+SPIN+'</div></div>'+
    '<div class="card"><div class="card-title"><span class="material-symbols-outlined">insights</span>Sessão</div><div id="breathing-session"><div class="empty"><span class="material-symbols-outlined">air</span>Escolha uma técnica ao lado.</div></div>'+
      '<div class="divider"></div><div class="card-title" style="font-size:13px;"><span class="material-symbols-outlined" style="font-size:18px;">bar_chart</span>Estatísticas</div><div id="breathing-stats" style="font-size:13px;">'+SPIN+'</div></div>'+
  '</div>';
}
function wire_breathing(){
  loadInto('breathing-list', ()=>api('/breathing/techniques'), (list)=>{
    list = Array.isArray(list)?list:(list?.content||[]);
    return list.map(t=>'<div class="list-item" data-pick-technique="'+t.id+'" style="cursor:pointer;"><span class="material-symbols-outlined" style="color:var(--mint-700);">air</span><div class="meta"><div class="title">'+esc(t.name)+'</div><div class="sub">'+esc(t.description||(t.inhaleSeconds+'s inspirar · '+t.holdSeconds+'s segurar · '+t.exhaleSeconds+'s expirar'))+'</div></div><span class="material-symbols-outlined">chevron_right</span></div>').join('') || '<div class="empty">Nenhuma técnica encontrada.</div>';
  }, (list)=>{
    list = Array.isArray(list)?list:(list?.content||[]);
    $$('[data-pick-technique]').forEach(el=>el.addEventListener('click', ()=>{
      const t = list.find(x=>String(x.id)===el.getAttribute('data-pick-technique'));
      startBreathing(t);
    }));
  });
  loadInto('breathing-stats', ()=>api('/breathing/stats').catch(()=>null), (s)=>{
    if(!s) return '<div class="muted">Sem dados ainda.</div>';
    return '<div class="stat-trio"><div><div class="num" style="font-size:18px;">'+(s.totalSessions??s.sessions??0)+'</div><div class="lbl">Sessões</div></div><div><div class="num" style="font-size:18px;">'+(s.totalMinutes??s.minutes??0)+'</div><div class="lbl">Minutos</div></div><div><div class="num" style="font-size:18px;">'+(s.favoriteTechnique?'★':(s.byTechnique?Object.keys(s.byTechnique).length:0))+'</div><div class="lbl">Técnicas usadas</div></div></div>';
  });
}
function startBreathing(t){
  clearInterval(breathState.timer); breathState.technique=t; breathState.running=false;
  const inhale = t.inhaleSeconds||t.inhale||4, hold1 = t.holdSeconds||t.hold||4, exhale = t.exhaleSeconds||t.exhale||4, hold2 = t.hold2Seconds||t.pause||0;
  const phases = [{n:'Inalar',s:inhale,cls:'breathe-scale-in'},{n:'Segurar',s:hold1,cls:'breathe-scale-hold'},{n:'Exalar',s:exhale,cls:'breathe-scale-out'}];
  if(hold2>0) phases.push({n:'Pausa',s:hold2,cls:'breathe-scale-hold'});
  const el = $('#breathing-session');
  el.innerHTML = '<div class="breathe-stage"><h4 style="margin-bottom:2px;">'+esc(t.name)+'</h4>'+
    '<div class="breathe-circle" id="breathe-circle"><span class="phase" id="breathe-phase">Pronto</span><span class="secs" id="breathe-secs">'+phases[0].s+'</span></div>'+
    '<button class="btn btn-primary" id="breathe-start">Começar</button></div>';
  $('#breathe-start').addEventListener('click', function(){
    if(breathState.running){ clearInterval(breathState.timer); breathState.running=false; this.textContent='Continuar'; return; }
    breathState.running = true; this.textContent='Pausar';
    let pIdx=0, secLeft=phases[0].s;
    const circle = $('#breathe-circle'), phaseLbl=$('#breathe-phase'), secLbl=$('#breathe-secs');
    circle.className='breathe-circle '+phases[0].cls; phaseLbl.textContent=phases[0].n; secLbl.textContent=secLeft;
    breathState.timer = setInterval(()=>{
      secLeft--;
      if(secLeft<=0){ pIdx=(pIdx+1)%phases.length; secLeft=phases[pIdx].s; circle.className='breathe-circle '+phases[pIdx].cls; phaseLbl.textContent=phases[pIdx].n;
        if(pIdx===0){ completeBreathingCycle(t); }
      }
      secLbl.textContent = secLeft;
    }, 1000);
  });
}
let breathCompletedOnce = {};
async function completeBreathingCycle(t){
  if(breathCompletedOnce[t.id]) return; breathCompletedOnce[t.id]=true;
  try{ await api('/breathing/techniques/'+t.id+'/complete', {method:'POST'}); toast('Sessão registrada! +XP','success'); }catch(e){}
}

function wire_profile(){
  $('#profile-form').addEventListener('submit', async (e)=>{
    e.preventDefault(); const fd = new FormData(e.target); const btn = e.target.querySelector('button');
    btn.disabled = true;
    try{
      const body = {displayName:fd.get('displayName'), bio:fd.get('bio'), status:fd.get('status'), visibility:fd.get('visibility')};
      await api('/profile/me', {method:'PUT', body});
      await fetchMe(); toast('Perfil atualizado!','success'); rerenderContent();
    }catch(err){ toast(err.message,'error'); } finally{ btn.disabled=false; }
  });
  $('#avatar-input').addEventListener('change', async (e)=>{
    const file = e.target.files[0]; if(!file) return;
    if(file.size > 2*1024*1024){ toast('A imagem deve ter até 2MB.','error'); return; }
    const fd = new FormData(); fd.append('file', file); fd.append('avatar', file);
    try{ await api('/profile/me/avatar', {method:'POST', body:fd}); await fetchMe(); toast('Foto atualizada!','success'); rerenderContent(); }catch(err){ toast(err.message,'error'); }
  });
  $('#profile-logout-btn').addEventListener('click', ()=>confirmModal('Sair da conta','Tem certeza que deseja sair?', ()=>logout(), 'Sair'));
}

function shopItemModal(existing){
  openModal('<h3 style="margin-bottom:16px;padding-right:24px;">'+(existing?'Editar item':'Novo item')+'</h3><form id="shop-item-form">'+
    '<div class="field"><label>Nome</label><input type="text" name="name" required value="'+esc(existing?.name||'')+'"></div>'+
    '<div class="field"><label>Tipo</label><select name="type">'+Object.entries(ENUMS.shopItemTypes).map(([v,l])=>'<option value="'+v+'" '+(existing?.type===v?'selected':'')+'>'+l+'</option>').join('')+'</select></div>'+
    '<div class="field"><label>Descrição</label><textarea name="description">'+esc(existing?.description||'')+'</textarea></div>'+
    '<div class="field"><label>Preço (XP)</label><input type="number" name="price" value="'+(existing?.price??50)+'"></div>'+
    '<button class="btn btn-primary btn-block" type="submit">Salvar</button></form>');
  $('#shop-item-form').addEventListener('submit', async (e)=>{
    e.preventDefault(); const fd=new FormData(e.target);
    const body = {name:fd.get('name'), type:fd.get('type'), description:fd.get('description'), price:Number(fd.get('price'))};
    try{ if(existing) await api('/admin/shop/items/'+existing.id,{method:'PUT',body}); else await api('/admin/shop/items',{method:'POST',body}); toast('Salvo!','success'); closeModal(); loadAdminShopList(); }catch(err){ toast(err.message,'error'); }
  });
}
async function loadAdminLogs(){
  const el = $('#admin-panel'); el.innerHTML = SPIN;
  try{
    const data = await api('/admin/logs');
    const list = Array.isArray(data)?data:(data?.content||[]);
    el.innerHTML = '<div class="card">'+(list.length ? list.map(l=>'<div class="list-item"><span class="material-symbols-outlined">history</span><div class="meta"><div class="title">'+esc(l.action||l.type)+'</div><div class="sub">por '+esc(l.adminName||l.adminId||'')+' · '+fmtDateTime(l.createdAt)+'</div></div></div>').join('') : '<div class="empty">Nenhum log ainda.</div>')+'</div>';
  }catch(e){ el.innerHTML = '<div class="empty">'+esc(e.message)+'</div>'; }
}

/* =========================================================
   WEBSOCKET (STOMP sobre SockJS) — Fase 4
   Conecta em /ws, autentica no frame CONNECT com Bearer token.
   Se a conexão falhar, o app inteiro continua funcionando via
   fallback REST (cada tela de chat já trata os dois casos).
   ========================================================= */
function connectSocket(){
  if(typeof SockJS === 'undefined' || typeof StompJs === 'undefined'){
    console.warn('SockJS/Stomp não carregados — chat funcionará apenas via REST.');
    return;
  }
  if(state.ws.client) return;
  try{
    const client = new StompJs.Client({
      webSocketFactory: () => new SockJS(CONFIG.WS_URL),
      connectHeaders: { Authorization: 'Bearer ' + state.accessToken },
      reconnectDelay: 6000,
      heartbeatIncoming: 10000,
      heartbeatOutgoing: 10000,
      onConnect: () => {
        state.ws.connected = true;
        const dot = $('#conn-dot'); if(dot){ dot.classList.add('on'); dot.title='Conectado em tempo real'; }
        try{
          state.ws.subs['notif'] = client.subscribe('/user/queue/notifications', (frame)=>{
            try{
              const n = JSON.parse(frame.body);
              state.notifUnread = (state.notifUnread||0) + 1;
              refreshNotifCount();
              toast(n.title || n.message || 'Nova notificação', 'info');
            }catch(e){}
          });
        }catch(e){}
        if(state.route==='chat' && chatState.currentRoomId) subscribeRoom(chatState.currentRoomId);
      },
      onDisconnect: () => { state.ws.connected = false; const dot = $('#conn-dot'); if(dot){ dot.classList.remove('on'); dot.title='Modo offline (REST)'; } },
      onStompError: () => { state.ws.connected = false; },
      onWebSocketError: () => { state.ws.connected = false; }
    });
    client.activate();
    state.ws.client = client;
  }catch(e){ console.warn('Falha ao iniciar WebSocket, seguindo em modo REST.', e); }
}
function disconnectSocket(){
  if(state.ws.client){ try{ state.ws.client.deactivate(); }catch(e){} }
  state.ws.client = null; state.ws.connected = false; state.ws.subs = {};
}
